<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sade Lezzetler - Kafe Menümüz">
    <meta name="keywords" content="kafe, menü, kahve, yiyecek, içecek">
    <meta name="author" content="Sade Lezzetler">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Sade Lezzetler - QR Menü">
    <meta property="og:description" content="Menümüzü keşfedin">
    <meta property="og:type" content="website">
    
    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#4A6741">
    
    <!-- Apple Touch Icon -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Sade Lezzetler Menü</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <img src="logo.png" alt="Sade Lezzetler - Healthy &amp; Delicious logo" class="header-logo">
        </div>
    </header>

    <!-- Category Navigation -->
    <nav class="category-nav" id="categoryNav">
        <div class="loading">Yükleniyor</div>
    </nav>

    <!-- Filter Toggle Button & Language Switcher -->
    <div class="filter-container">
        <button id="filterToggleBtn" class="filter-toggle-btn">
            <span class="filter-icon">🔍</span>
            <span class="filter-text">Filtrele</span>
            <span id="filterCount" class="filter-count" style="display: none;">0</span>
        </button>
        <button id="languageSwitcher" class="language-switcher" aria-label="Switch language">EN</button>
    </div>

    <!-- Filter Drawer -->
    <div id="filterDrawer" class="filter-drawer">
        <div class="filter-drawer-overlay"></div>
        <div class="filter-drawer-content">
            <div class="filter-drawer-header">
                <h3>🔍 Filtreler</h3>
                <button id="filterCloseBtn" class="filter-close-btn">✕</button>
            </div>

            <div class="filter-drawer-body">
                <!-- Protein Filters -->
                <div class="filter-section">
                    <button class="filter-group-toggle" id="proteinToggle">
                        <span>🍗 Protein</span>
                        <span class="toggle-icon expanded">▼</span>
                    </button>
                    <div class="filter-group-items open" id="proteinOptions"></div>
                </div>

                <!-- Carbohydrate Filters -->
                <div class="filter-section">
                    <button class="filter-group-toggle" id="carbToggle">
                        <span>🍞 Karbonhidrat</span>
                        <span class="toggle-icon">▶</span>
                    </button>
                    <div class="filter-group-items" id="carbOptions"></div>
                </div>

                <!-- Allergen Filters -->
                <div class="filter-section">
                    <button class="filter-group-toggle" id="allergenToggle">
                        <span>⚠️ Alerjen Maddeler</span>
                        <span class="toggle-icon">▶</span>
                    </button>
                    <div class="filter-group-items" id="allergenOptions">
                        <p class="allergen-note">ℹ️ Seçtiklerinizi içerenler listelenmeyecektir.</p>
                    </div>
                </div>

                <!-- Price Filters -->
                <div class="filter-section">
                    <h4 class="filter-section-title">💰 Fiyat Aralığı</h4>
                    <div class="price-filters" id="priceFilters"></div>
                </div>
            </div>

            <div class="filter-drawer-footer">
                <button id="filterClearBtn" class="filter-btn-secondary">🔄 Temizle</button>
                <button id="filterApplyBtn" class="filter-btn-primary">✅ Uygula</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container">
        <!-- Çölyak Uyarı Banner'ı -->
        <div id="warning-banner" class="category-warning" style="display: none;">
            <div class="warning-content">
                <span class="warning-icon">⚠️</span>
                <p class="warning-text">
                    <strong>Önemli:</strong> Çölyak durumunuz varsa lütfen sipariş öncesi personelimize bildiriniz.
                </p>
            </div>
        </div>
        <div id="menuContainer">
            <div class="loading">Menü yükleniyor</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>🌱 Doğal • ♻️ Sürdürülebilir • 💚 Sağlıklı</p>
        <p class="small-text">© 2021 - 𐰋𐰃𐰠𐰏𐰀:𐰴𐰍𐰣</p>
    </footer>

    <!-- Scroll-to-top Button -->
    <button class="scroll-to-top" id="scrollToTop" aria-label="Yukarı çık">↑</button>

    <!-- Image Modal/Lightbox -->
    <div class="image-modal" id="imageModal">
      <span class="modal-close" id="modalClose" aria-label="Kapat">&times;</span>
      <img class="modal-content" id="modalImage" alt="">
      <div class="modal-caption" id="modalCaption"></div>
      <p class="modal-allergens" id="modalAllergens"></p>
    </div>

    <!-- Squirrel Animation -->
    <div id="squirrelContainer" class="squirrel-container" aria-hidden="true">
        <div class="squirrel-message" lang="tr">Ayyy hepsi çok lezzetli gözüküyor! 🌰</div>
        <div class="squirrel-body">🐿️</div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
